<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Translation Tool</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <h1>Language Translation Tool</h1>
        <p class="subtitle">Translate text instantly between languages.</p>

        <div class="language-row">
          <label>
            <span>From</span>
            <select id="sourceLang">
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
              <option value="hi">Hindi</option>
              <option value="ur">Urdu</option>
              <option value="sd">Sindhi</option>
              <option value="ar">Arabic</option>
              <option value="zh">Chinese</option>
              <option value="ja">Japanese</option>
              <option value="pt">Portuguese</option>
              <option value="ru">Russian</option>
            </select>
          </label>

          <label>
            <span>To</span>
            <select id="targetLang">
              <option value="fr">French</option>
              <option value="en">English</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
              <option value="hi">Hindi</option>
              <option value="ur">Urdu</option>
              <option value="sd">Sindhi</option>
              <option value="ar">Arabic</option>
              <option value="zh">Chinese</option>
              <option value="ja">Japanese</option>
              <option value="pt">Portuguese</option>
              <option value="ru">Russian</option>
            </select>
          </label>
        </div>

        <textarea id="sourceText" rows="8" placeholder="Enter text to translate..."></textarea>

        <div class="actions">
          <button id="translateBtn">Translate</button>
          <button id="swapBtn" class="secondary">Swap</button>
        </div>

        <section class="output-card">
          <div class="output-header">
            <h2>Translation</h2>
            <div class="output-actions">
              <button id="copyBtn" class="secondary">Copy</button>
              <button id="speakBtn" class="secondary">Speak</button>
            </div>
          </div>
          <div id="result" class="result">Your translated text will appear here.</div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
